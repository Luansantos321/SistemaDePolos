{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login do Polo</title>

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary: #2c3e50;
            --primary-dark: #1f2c38;
            --border: #d0d7de;
        }

        body {
            margin: 0;
            padding: 0;
            background: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .login-container {
            width: 400px;
            padding: 45px 40px;
            background: #fff;
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0px 8px 28px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.35s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container h2 {
            text-align: center;
            color: var(--primary);
            font-size: 1.9rem;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 18px;
            width: 100%;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            padding: 13px 48px 13px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            transition: all .3s;
            box-sizing: border-box;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 7px rgba(44, 62, 80, 0.35);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            font-size: 18px;
            cursor: pointer;
            color: var(--primary);
            opacity: 0.75;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        button {
            width: 100%;
            padding: 13px;
            border: none;
            cursor: pointer;
            background: var(--primary);
            color: #ffffff;
            font-size: 17px;
            border-radius: 8px;
            margin-top: 10px;
            transition: 0.25s;
            font-weight: 600;
        }

        button:hover {
            background: var(--primary-dark);
            transform: scale(1.02);
        }

        .error {
            background: #fde4e4;
            color: #c0392b;
            padding: 12px;
            border-left: 4px solid #c0392b;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="login-container">

        <h2>Acesso ao Sistema</h2>

        {% if form.errors %}
        <div class="error">Usuário ou senha incorretos!</div>
        {% endif %}

        <form method="post" action="{% url 'usuarios:login' %}">
            {% csrf_token %}

            <div class="input-group">
                <label>Usuário</label>
                <div class="input-wrapper">
                    <input type="text" name="username" placeholder="Digite seu usuário" required>
                </div>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <div class="input-wrapper">
                    <input type="password" id="senha" name="password" placeholder="Digite sua senha" required>
                    <i class="bi bi-eye toggle-password" onclick="toggleSenha()"></i>
                </div>
            </div>

            <button type="submit">Entrar</button>
        </form>

    </div>

    <script>
        function toggleSenha() {
            const campo = document.getElementById("senha");
            campo.type = campo.type === "password" ? "text" : "password";
        }
    </script>

</body>

</html>
