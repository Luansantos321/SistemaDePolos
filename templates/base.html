<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Administração Central</title>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
/* ============================= */
/*        VARIÁVEIS GERAIS       */
/* ============================= */
:root {
  --primaria: #1b2a41;
  --primaria-clara: #24344d;
  --primaria-hover: #0f1825;

  --cinza-fundo: #f4f6f9;
  --cinza-linha: #d7dde4;

  --texto-principal: #1d1f20;
  --texto-secundario: #4a4f56;

  --caixa: #ffffff;
}

/* ============================= */
/*   RESET + BASE DA PÁGINA      */
/* ============================= */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Segoe UI", Roboto, Arial, sans-serif;
}

body {
  display:flex;
  background: var(--cinza-fundo);
  min-height:100vh;
  color: var(--texto-principal);
}

/* ============================= */
/*        TOPO DO SISTEMA        */
/* ============================= */
header {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;

  background: var(--primaria);
  color:white;

  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 28px;
  z-index:100;

  box-shadow:0 2px 8px rgba(0,0,0,.25);
}

header .titulo-topo {
  font-size:20px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:10px;
}

header .user-info {
  font-size:14px;
  opacity:.95;
  display:flex;
  align-items:center;
  gap:8px;
}

/* ============================= */
/*          MENU LATERAL         */
/* ============================= */
aside {
  width:270px;
  background:var(--caixa);
  border-right:1px solid var(--cinza-linha);

  position:fixed;
  left:0;
  top:70px;
  height:calc(100vh - 70px);
  overflow-y:auto;
  padding-top:20px;
}

aside nav a {
  display:flex;
  align-items:center;
  gap:12px;

  padding:15px 25px;
  text-decoration:none;

  color:var(--texto-secundario);
  font-size:15px;
  font-weight:500;

  border-left:4px solid transparent;
  transition:0.25s ease-in-out;
}

aside nav a i {
  font-size:18px;
  opacity:.8;
}

aside nav a:hover {
  background:#e8edf3;
  border-left-color: var(--primaria);
  color:var(--primaria);
  font-weight:600;
}

/* Estado ativo (caso você queira usar) */
aside nav a.active {
  background:#e8edf3;
  border-left-color: var(--primaria);
  color:var(--primaria);
  font-weight:600;
}

/* Botão sair */
.logout-btn {
  width:100%;
  padding:15px 25px;
  margin-top:20px;

  display:flex;
  align-items:center;
  gap:12px;

  background:none;
  border:none;
  color:#b42e2e;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  text-align:left;
  transition:0.25s;
}

.logout-btn:hover {
  background:#ffe5e5;
}

/* ============================= */
/*         ÁREA PRINCIPAL        */
/* ============================= */
main {
  margin-left:270px;
  padding:100px 40px 40px;
  width:100%;
}

.titulo-pagina {
  font-size:26px;
  font-weight:600;
  margin-bottom:25px;
  color:var(--primaria);
}

.card {
  background:white;
  padding:25px;
  border-radius:12px;
  margin-bottom:25px;
  box-shadow:0 2px 8px rgba(0,0,0,0.07);
  border:1px solid #e1e4e8;
}

</style>
</head>

<body>

<header>
  <div class="titulo-topo">
    <i class="bi bi-building-gear"></i> Administração Central
  </div>

  <div class="user-info">
    <i class="bi bi-person-circle"></i>
    {{ request.user.username }}
  </div>
</header>

<aside>
  <nav>
    <a href="{% url 'home' %}">
      <i class="bi bi-speedometer"></i> Dashboard Central
    </a>

    <a href="{% url 'portal:criar_usuario' %}">
      <i class="bi bi-people"></i> Gerenciar Usuários
    </a>

    <a href="#">
      <i class="bi bi-bank"></i> Gerenciar Polos
    </a>

    <a href="{% url 'escolas:calendario_admin' %}">
      <i class="bi bi-journal-bookmark"></i> Gestão Acadêmica
    </a>
  </nav>

  <form action="{% url 'logout' %}" method="post">
    {% csrf_token %}
    <button class="logout-btn">
      <i class="bi bi-box-arrow-right"></i> Sair
    </button>
  </form>
</aside>

<main>
  {% block content %}
  {% endblock %}
</main>

</body>
</html>
