{% extends 'base.html' %}
{% block title %}Criar Polo{% endblock %}
{% block content %}

<style>
    .card-form {
        max-width: 550px;
        margin: 30px auto;
        background: #ffffff;
        padding: 35px 40px;
        border-radius: 14px;
        border: 1px solid #d0d7de;
        box-shadow: 0px 6px 18px rgba(0,0,0,0.12);
        font-family: "Segoe UI", Arial, sans-serif;
        animation: fadeIn .35s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .card-form h2 {
        text-align: center;
        color: #2c3e50;
        font-weight: 700;
        font-size: 1.8rem;
        margin-bottom: 25px;
    }

    .form-group {
        margin-bottom: 18px;
    }

    .form-group label {
        font-weight: 600;
        color: #2c3e50;
        display: block;
        margin-bottom: 6px;
        font-size: 15px;
    }

    .form-group input[type="text"],
    .form-group input[type="file"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        font-size: 15px;
        transition: .3s;
        box-sizing: border-box;
    }

    .form-group input:focus {
        border-color: #2c3e50;
        box-shadow: 0 0 6px rgba(44, 62, 80, .35);
        outline: none;
    }

    .logo-preview {
        margin-top: 10px;
        border-radius: 8px;
        border: 1px solid #ddd;
    }

    .btn-submit {
        width: 100%;
        padding: 13px;
        background-color: #2c3e50;
        border: none;
        border-radius: 8px;
        text-align: center;
        color: #ffffff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: .25s;
        margin-top: 10px;
    }

    .btn-submit:hover {
        background-color: #1f2c38;
        transform: scale(1.02);
    }

    .link-voltar {
        display: block;
        margin-top: 18px;
        text-align: center;
        font-size: 15px;
        color: #2c3e50;
        text-decoration: none;
        font-weight: 500;
        transition: .2s;
    }

    .link-voltar:hover {
        text-decoration: underline;
    }
</style>

<div class="card-form">

    <h2>{% if polo %}Editar Polo{% else %}Criar Polo{% endif %}</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>Nome:</label>
            <input type="text" name="nome" value="{{ polo.nome|default:'' }}" required>
        </div>

        <div class="form-group">
            <label>Endereço:</label>
            <input type="text" name="endereco" value="{{ polo.endereco|default:'' }}">
        </div>

        <div class="form-group">
            <label>Telefone:</label>
            <input type="text" name="telefone" value="{{ polo.telefone|default:'' }}">
        </div>

        <div class="form-group">
            <label>Logo:</label>
            <input type="file" name="logo">

            {% if polo.logo %}
                <img src="{{ polo.logo.url }}" width="120" class="logo-preview">
            {% endif %}
        </div>

        <button type="submit" class="btn-submit">
            {% if polo %}Salvar Alterações{% else %}Criar Polo{% endif %}
        </button>

    </form>

    <a href="{% url 'portal:home' %}" class="link-voltar">Voltar</a>

</div>

{% endblock %}
